name: Question
description: Ask a question about borsa
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the README and existing issues.

  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish?
